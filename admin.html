<!doctype html>
<html lang="pt-BR">
   <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Raízes Novas</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="css/style.css">
        <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
        <link rel="alternate icon" type="image/png" href="assets/img/favicon.ico">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/7.1.0/tinymce.min.js"></script>
        <script src="js/auth.js"></script>
    </head>
    <body>
        <header></header>
        <main class="container mt-5">
            <h2 class="mb-4">Criar Novo Artigo - Raízes Novas</h2>
            
            <form id="form-artigo">
                <div class="mb-3">
                    <label for="titulo" class="form-label">Título do Artigo</label>
                    <input type="text" class="form-control" id="titulo" placeholder="Ex: Cursos Gratuitos na Fundação Bradesco" required>
                </div>

                <div class="mb-3">
                  <label for="imagem-capa" class="form-label">Imagem de Capa</label>
                  <input class="form-control" type="file" id="imagem-capa" accept="image/png, image/jpeg, image/webp" required>
              </div>
                <div class="mb-3">
                    <label for="palavra-chave" class="form-label fw-bold">Palavra-chave</label>
                    <select class="form-select" id="palavra-chave" required>
                        <option value="" selected disabled>Carregando palavras-chave...</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Conteúdo do Artigo</label>
                    <textarea id="conteudo-artigo">
                        Conte aqui mais sobre essa oportunidade...
                    </textarea>
                </div>

                <button type="submit" class="btn btn-primary w-100">Publicar Artigo</button>
            </form>

            <script>
                tinymce.init({
                    selector: '#conteudo-artigo',
                    license_key: 'gpl', // CORREÇÃO: Remove o aviso de avaliação
                    
                    // Plugins gratuitos e essenciais
                    plugins: 'anchor autolink charmap codesample emoticons link lists media searchreplace table visualblocks wordcount',
                    toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline strikethrough | link image media table | align lineheight | numlist bullist indent outdent | emoticons charmap | removeformat',
                    height: 400,
                    promotion: false, 
                    branding: false,
                    // language: 'pt_BR' // CORREÇÃO: Comente ou remova esta linha se não tiver o arquivo local
                });
            </script>
        </main>

        <script src="js/api.js"></script>

        <script src="js/admin.js"></script>
    </body>
</html>
